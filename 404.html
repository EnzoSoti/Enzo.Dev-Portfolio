<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found</title>
    <link rel="icon" href="image/new_formal-removebg-preview.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Georgia', 'serif'],
                        mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
                    },
                    colors: {
                        cream: '#F7F5F0',
                        ink: '#0F0E0C',
                        accent: '#C8522A',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/site.css">
    <style>
        /* Fade up animation keyframe */
        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up {
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body class="bg-cream text-ink font-mono min-h-screen flex flex-col justify-between transition-colors duration-300 dark:bg-ink dark:text-cream">

    <!-- Custom Fluid Cursor elements -->
    <div id="customCursor" class="hidden md:block fixed w-8 h-8 rounded-full border border-accent pointer-events-none z-[100] -translate-x-1/2 -translate-y-1/2 transition-all duration-300 ease-out"></div>
    <div id="customCursorDot" class="hidden md:block fixed w-2 h-2 rounded-full bg-accent pointer-events-none z-[100] -translate-x-1/2 -translate-y-1/2"></div>

    <!-- Nav / Branding -->
    <nav class="w-full max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
        <span class="text-xs tracking-widest uppercase font-semibold text-accent">enzo.daniela</span>
        <button id="themeToggle" class="w-7 h-7 flex items-center justify-center rounded-full border border-ink/20 dark:border-cream/20 hover:bg-ink/5 dark:hover:bg-cream/5 transition-colors" aria-label="Toggle theme">
            <svg id="sunIcon" class="w-3.5 h-3.5 hidden dark:block" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 2a1 1 0 011 1v1a1 1 0 01-2 0V3a1 1 0 011-1zm0 15a5 5 0 100-10 5 5 0 000 10zm7.07-12.07a1 1 0 010 1.41l-.71.71a1 1 0 01-1.41-1.41l.71-.71a1 1 0 011.41 0zM21 11h1a1 1 0 010 2h-1a1 1 0 010-2zM4.93 4.93a1 1 0 011.41 0l.71.71a1 1 0 01-1.41 1.41l-.71-.71a1 1 0 010-1.41zM3 11h1a1 1 0 010 2H3a1 1 0 010-2zm15.36 7.07l-.71-.71a1 1 0 011.41-1.41l.71.71a1 1 0 01-1.41 1.41zM12 20a1 1 0 011 1v1a1 1 0 01-2 0v-1a1 1 0 011-1zm-7.07-1.93a1 1 0 010-1.41l.71-.71a1 1 0 011.41 1.41l-.71.71a1 1 0 01-1.41 0z" />
            </svg>
            <svg id="moonIcon" class="w-3.5 h-3.5 block dark:hidden" fill="currentColor" viewBox="0 0 24 24">
                <path d="M21 12.79A9 9 0 1111.21 3a7 7 0 109.79 9.79z" />
            </svg>
        </button>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col justify-center px-6">
        <div class="max-w-xl mx-auto text-center animate-fade-up">
            <h1 class="font-display text-[9rem] md:text-[12rem] leading-none text-accent font-normal opacity-10 select-none absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 z-0">404</h1>
            <div class="relative z-10 space-y-6">
                <p class="text-xs tracking-[0.3em] uppercase text-accent font-semibold">Route Unresolved</p>
                <h2 class="font-display text-4xl md:text-5xl font-normal tracking-tight">Lost in Transit.</h2>
                <p class="text-sm opacity-60 max-w-sm mx-auto leading-relaxed">
                    The URL you requested does not exist or has been shifted. Let's guide you back to the main workspace.
                </p>
                <div class="pt-4">
                    <a href="/" class="inline-flex items-center gap-3 px-6 py-3 bg-ink text-cream dark:bg-cream dark:text-ink text-xs tracking-widest uppercase hover:opacity-90 transition-all duration-300 border border-transparent shadow-sm">
                        <span>← Return Home</span>
                    </a>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-6 px-6 border-t border-ink/10 dark:border-cream/10">
        <div class="max-w-5xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-2 text-center sm:text-left">
            <p class="text-xs opacity-30">© 2026 Enzo P. Daniela</p>
            <p class="text-xs opacity-30">Caloocan City, Philippines</p>
        </div>
    </footer>

    <!-- Interactive script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Theme toggle logic
            const toggle = document.getElementById('themeToggle');
            const html = document.documentElement;
            if (localStorage.theme === 'dark' || (!localStorage.theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                html.classList.add('dark');
            }
            if (toggle) {
                toggle.addEventListener('click', () => {
                    html.classList.toggle('dark');
                    localStorage.theme = html.classList.contains('dark') ? 'dark' : 'light';
                });
            }

            // Custom Fluid Cursor logic
            const cursor = document.getElementById('customCursor');
            const cursorDot = document.getElementById('customCursorDot');
            let mouseX = 0, mouseY = 0;
            let posX = 0, posY = 0;

            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
                if (cursorDot) {
                    cursorDot.style.left = mouseX + 'px';
                    cursorDot.style.top = mouseY + 'px';
                }
            });

            function animateCursor() {
                const distX = mouseX - posX;
                const distY = mouseY - posY;
                posX += distX * 0.15;
                posY += distY * 0.15;
                if (cursor) {
                    cursor.style.left = posX + 'px';
                    cursor.style.top = posY + 'px';
                }
                requestAnimationFrame(animateCursor);
            }
            animateCursor();

            // Cursor hover states
            const hoverables = 'a, button';
            document.querySelectorAll(hoverables).forEach(el => {
                el.addEventListener('mouseenter', () => {
                    if (cursor) cursor.classList.add('scale-150', 'bg-accent/10');
                });
                el.addEventListener('mouseleave', () => {
                    if (cursor) cursor.classList.remove('scale-150', 'bg-accent/10');
                });
            });
        });
    </script>
</body>
</html>
